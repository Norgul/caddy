services:
  caddy:
    image: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy-ui:
    build: ./ui
    volumes:
      - ./Caddyfile:/app/Caddyfile
      - /etc/hosts:/app/hosts
    depends_on:
      - caddy

volumes:
  caddy_data:
  caddy_config:
